<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>肠粉传播路径地图（大地色系）</title>
    <script src="./echarts.min.js"></script>
    <script src="./world.js"></script>
</head>
<body style="margin:0; background:#f8f4e9;">
    <div id="map" style="width:100vw; height:100vh;"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'));

        var geoCoordMap = {
            "广州市": [113.27, 23.13],
            "佛山市": [113.12, 23.02],
            "肇庆市": [112.47, 23.05],
            "深圳市": [114.06, 22.54],
            "东莞市": [113.75, 23.02],
            "惠州市": [114.42, 23.11],
            "珠海市": [113.55, 22.27],
            "中山市": [113.39, 22.52],
            "江门市": [113.09, 22.58]
        };

        var period1 = [
            ['广州市', '佛山市'],
            ['广州市', '肇庆市'],
            ['广州市', '深圳市'],
            ['广州市', '东莞市'],
            ['广州市', '惠州市'],
            ['广州市', '珠海市'],
            ['广州市', '中山市'],
            ['广州市', '江门市']
        ];

        function buildLinesData(arr) {
            return arr.map(function(pair) {
                return {
                    coords: [geoCoordMap[pair[0]], geoCoordMap[pair[1]]],
                    fromName: pair[0],
                    toName: pair[1]
                };
            });
        }

        var scatterData = Object.keys(geoCoordMap).map(function (name) {
            return {
                name: name,
                value: geoCoordMap[name]
            };
        });

        var option = {
            backgroundColor: '#f8f4e9',
            legend: {
                data: ['清代至清末 珠三角圈层传播'],
                textStyle: { color: '#5A3E2B', fontSize: 13, fontWeight: 'normal' },
                top: 10,
                left: 'center',
                icon: 'roundRect',
                itemWidth: 20,
                itemHeight: 10
            },
            geo: {
                map: 'world',
                roam: true,
                zoom: 9.5, // 精准匹配你截图的放大级别
                center: [113.3, 23.0], // 精准匹配你截图的中心点
                itemStyle: {
                    areaColor: '#e8e0cc',
                    borderColor: '#c7bfa9'
                },
                emphasis: {
                    itemStyle: {
                        areaColor: '#d6cdb5'
                    },
                    label: { show: false }
                }
            },
            series: [
                {
                    name: '清代至清末 珠三角圈层传播',
                    type: 'lines',
                    coordinateSystem: 'geo',
                    zlevel: 2,
                    data: buildLinesData(period1),
                    lineStyle: {
                        color: '#7A4A2E',
                        width: 2,
                        curveness: 0.3,
                        opacity: 1
                    },
                    effect: {
                        show: true,
                        period: 6,
                        trailLength: 0.4,
                        symbol: 'arrow',
                        symbolSize: 8,
                        color: '#7A4A2E'
                    }
                },
                {
                    type: 'effectScatter',
                    coordinateSystem: 'geo',
                    zlevel: 3,
                    rippleEffect: {
                        brushType: 'stroke',
                        scale: 4
                    },
                    label: {
                        show: true,
                        position: 'right',
                        formatter: '{b}',
                        color: '#5A3E2B',
                        fontSize: 14
                    },
                    symbolSize: 10,
                    itemStyle: {
                        color: '#7A4A2E',
                        shadowBlur: 10,
                        shadowColor: '#7A4A2E'
                    },
                    data: scatterData
                }
            ]
        };

        chart.setOption(option);
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
