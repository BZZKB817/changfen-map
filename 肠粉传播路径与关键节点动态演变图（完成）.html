<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>肠粉传播路径地图（大地色系）</title>
    <script src="./echarts.min.js"></script>
    <script src="./world.js"></script>
</head>
<body style="margin:0; background:#f8f4e9;">
    <div id="map" style="width:100vw; height:100vh;"></div>
    <script>
        var chart = echarts.init(document.getElementById('map'));

        var geoCoordMap = {
            "罗定市": [111.57, 22.77],
            "广州市": [113.27, 23.13],
            "佛山市": [113.12, 23.02],
            "肇庆市": [112.47, 23.05],
            "深圳市": [114.06, 22.54],
            "东莞市": [113.75, 23.02],
            "惠州市": [114.42, 23.11],
            "珠海市": [113.55, 22.27],
            "中山市": [113.39, 22.52],
            "江门市": [113.09, 22.58],
            "香港": [114.17, 22.32],
            "澳门": [113.54, 22.19],
            "汕头市": [116.68, 23.35],
            "潮州市": [116.63, 23.66],
            "揭阳市": [116.38, 23.55],
            "北京市": [116.40, 39.90],
            "上海市": [121.47, 31.23],
            "成都市": [104.07, 30.67],
            "武汉市": [114.31, 30.59],
            "杭州市": [120.16, 30.26],
            "东京（日本）": [139.69, 35.69],
            "新加坡（新加坡）": [103.82, 1.35],
            "吉隆坡（马来西亚）": [101.69, 3.14],
            "曼谷（泰国）": [100.50, 13.75],
            "纽约（美国）": [-74.00, 40.71],
            "多伦多（加拿大）": [-79.38, 43.65],
            "伦敦（英国）": [-0.13, 51.51],
            "巴黎（法国）": [2.35, 48.86],
            "悉尼（澳大利亚）": [151.21, -33.87]
        };

        // ---------- 三个时期的线路数据 ----------
        var period1 = [
            ['罗定市', '广州市'],
            ['广州市', '佛山市'],
            ['广州市', '肇庆市'],
            ['广州市', '深圳市'],
            ['广州市', '东莞市'],
            ['广州市', '惠州市'],
            ['广州市', '珠海市'],
            ['广州市', '中山市'],
            ['广州市', '江门市']
        ];
        var period2 = [
            ['广州市', '香港'],
            ['广州市', '澳门'],
            ['广州市', '汕头市'],
            ['广州市', '潮州市'],
            ['广州市', '揭阳市']
        ];
        var period3 = [
            ['广州市', '北京市'],
            ['广州市', '上海市'],
            ['广州市', '成都市'],
            ['广州市', '武汉市'],
            ['广州市', '杭州市'],
            ['广州市', '东京（日本）'],
            ['广州市', '新加坡（新加坡）'],
            ['广州市', '吉隆坡（马来西亚）'],
            ['广州市', '曼谷（泰国）'],
            ['广州市', '纽约（美国）'],
            ['广州市', '多伦多（加拿大）'],
            ['广州市', '伦敦（英国）'],
            ['广州市', '巴黎（法国）'],
            ['广州市', '悉尼（澳大利亚）']
        ];

        function buildLinesData(arr) {
            return arr.map(function(pair) {
                return {
                    coords: [geoCoordMap[pair[0]], geoCoordMap[pair[1]]],
                    fromName: pair[0],
                    toName: pair[1]
                };
            });
        }

        var scatterData = Object.keys(geoCoordMap).map(function (name) {
            return {
                name: name,
                value: geoCoordMap[name]
            };
        });

        // ---------- 配置项 ----------
        var option = {
            backgroundColor: '#f8f4e9',
            legend: {
                data: ['第一期（清代至清末）', '第二期（20世纪中叶至80年代）', '第三期（20世纪末至今）'],
                textStyle: { color: '#5A3E2B', fontSize: 13, fontWeight: 'normal' },
                top: 10,
                left: 'center',
                icon: 'roundRect',
                itemWidth: 20,
                itemHeight: 10
            },
            geo: {
                map: 'world',
                roam: true,
                zoom: 1.5,
                center: [110, 25],
                itemStyle: {
                    areaColor: '#e8e0cc',
                    borderColor: '#c7bfa9'
                },
                emphasis: {
                    itemStyle: {
                        areaColor: '#d6cdb5'
                    },
                    label: { show: false }
                }
            },
            series: [
                // 第一期：深赭石
                {
                    name: '第一期（清代至清末）',
                    type: 'lines',
                    coordinateSystem: 'geo',
                    zlevel: 2,
                    data: buildLinesData(period1),
                    lineStyle: {
                        color: '#7A4A2E',
                        width: 1.6,
                        curveness: 0.3,
                        opacity: 0.9
                    },
                    effect: {
                        show: true,
                        period: 6,
                        trailLength: 0.4,
                        symbol: 'arrow',
                        symbolSize: 6,
                        color: '#7A4A2E'
                    }
                },
                // 第二期：陶土红
                {
                    name: '第二期（20世纪中叶至80年代）',
                    type: 'lines',
                    coordinateSystem: 'geo',
                    zlevel: 2,
                    data: buildLinesData(period2),
                    lineStyle: {
                        color: '#B66B4A',
                        width: 1.6,
                        curveness: 0.3,
                        opacity: 0.9
                    },
                    effect: {
                        show: true,
                        period: 6,
                        trailLength: 0.4,
                        symbol: 'arrow',
                        symbolSize: 6,
                        color: '#B66B4A'
                    }
                },
                // 第三期：沙金色
                {
                    name: '第三期（20世纪末至今）',
                    type: 'lines',
                    coordinateSystem: 'geo',
                    zlevel: 2,
                    data: buildLinesData(period3),
                    lineStyle: {
                        color: '#D4A87C',
                        width: 1.6,
                        curveness: 0.3,
                        opacity: 0.9
                    },
                    effect: {
                        show: true,
                        period: 6,
                        trailLength: 0.4,
                        symbol: 'arrow',
                        symbolSize: 6,
                        color: '#D4A87C'
                    }
                },
                // 散点（城市）
                {
                    type: 'effectScatter',
                    coordinateSystem: 'geo',
                    zlevel: 3,
                    rippleEffect: {
                        brushType: 'stroke',
                        scale: 3
                    },
                    label: {
                        show: true,
                        position: 'right',
                        formatter: '{b}',
                        color: '#5A3E2B',
                        fontSize: 12
                    },
                    symbolSize: 8,
                    itemStyle: {
                        color: '#7A4A2E',
                        shadowBlur: 10,
                        shadowColor: '#7A4A2E'
                    },
                    data: scatterData
                }
            ]
        };

        chart.setOption(option);
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
